# Execute your favorite apps at launch
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = nm-applet
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1

# -- Wallpaper
exec-once=hyprpaper
exec-once = ~/.config/hypr/scripts/rotate_hyprpaper.sh&

# Cliphist
exec-once = wl-paste --type text  --watch ~/.go/bin/cliphist store
exec-once = wl-paste --type image --watch ~/.go/bin/cliphist store

# -- Udiskie for mount stuff
exec-once = udiskie --tray &

# -- PaSystray
exec-once = pasystray

# -- Onedrive
exec-once = test -x "$(which onedrive)" && onedrive --monitor

# Plugins
exec-once = ~/.local/bin/pypr
