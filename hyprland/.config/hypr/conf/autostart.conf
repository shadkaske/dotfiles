# -- Wallpaper
exec-once = uwsm app -- hyprpaper
exec-once = uwsm app -- ~/.config/hypr/scripts/rotate_hyprpaper.sh

# Cliphist
exec-once = uwsm app -- wl-paste --type text  --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# -- Udiskie for mount stuff
exec-once = uwsm app -- udiskie --tray &

# -- Polkit
exec-once = uwsm app -- systemctl --user start hyprpolkitagent

# KDE Wallet
# exec-once = uwsm app -- uwsm app -- /usr/lib/pam_kwallet_init

# -- Bar
# exec-once = uwsm app -- waybar
exec-once = uwsm app -- hyprpanel

# -- Idle Control
exec-once = uwsm app -- hypridle

# -- Onedrive
exec-once = uwsm app -- test -x "$(which onedrive)" && onedrive --monitor

# Plugins
exec-once = uwsm app -- /usr/bin/pypr
