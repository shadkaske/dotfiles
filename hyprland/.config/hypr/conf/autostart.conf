# Execute your favorite apps at launch
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1

# -- Wallpaper
# exec-once=hyprpaper
# exec-once = ~/.config/hypr/scripts/rotate_hyprpaper.sh&
exec-once = swww-daemon
exec-once = swww img ~/.local/share/wallpaper.png

# Attempt to control laptop monitor sitution
exec-once = kanshi

# Cliphist
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# -- Udiskie for mount stuff
exec-once = udiskie --tray &

# -- Blueman
exec-once = blueman-applet

# NetworkManager Applet
exec-once = nm-applet;

# -- PaSystray
exec-once = pasystray

# -- Polkit
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1

# KDE Wallet
exec-once = /usr/libexec/pam_kwallet_init

# -- Notifications
exec-once = dunst

# -- Bar
exec-once = waybar

# -- Idle Control
exec-once = hypridle

# -- Onedrive
# exec-once = test -x "$(which onedrive)" && onedrive --monitor

# Plugins
exec-once = /usr/bin/pypr
