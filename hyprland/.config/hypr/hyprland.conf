# Some default env vars.
env = XCURSOR_THEME,Catppuccin-Mocha-Blue-Cursors
env = XCURSOR_SIZE,36
env = HYPRPAPER_ROTATE_TIME,15m
env = SSH_AUTH_SOCK,"$XDG_RUNTIME_DIR/gcr/ssh"
env = _JAVA_AWT_WM_NONREPARENTING,1
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland

source=~/.config/hypr/conf/monitors.conf

source=~/.config/hypr/conf/autostart.conf

source=~/.config/hypr/conf/input.conf

source=~/.config/hypr/conf/general.conf

source=~/.config/hypr/conf/decoration.conf

source=~/.config/hypr/conf/animations.conf

source=~/.config/hypr/conf/master_layout.conf

source=~/.config/hypr/conf/gestures.conf

source=~/.config/hypr/conf/misc.conf

source=~/.config/hypr/conf/binds.conf

source=~/.config/hypr/conf/window_rules.conf

source=~/.config/hypr/conf/keymaps.conf
