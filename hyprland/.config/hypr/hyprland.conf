# Monitor Configs
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=desc:Dell Inc. DELL S3220DGF CMCSF43,2560x1440@164.056000,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# -- Keyring
exec-once = kwalletmanager6 &
exec-once = sleep 1; /usr/lib/pam_kwallet_init --no-startup-id
exec-once = sleep 2; hyprctl dispatch closewindow org.kde.kwalletmanager6

# -- Polkit
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# -- Wallpaper
exec-once=hyprpaper
exec-once = ~/.config/hypr/scripts/rotate_hyprpaper.sh&
# -- Notifications
exec-once = dunst
# -- Bar
exec-once = waybar
# -- Idle Control
exec-once = hypridle
# -- Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# -- Background Apps
#exec-once = nm-applet
# -- Mouse Helper
exec-once = ckb-next --background
# -- Pyprland Plugin
exec-once = pypr

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 2

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    numlock_by_default = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 6
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(94e2d5ee) rgba(89dcebee) 45deg
    col.inactive_border = rgba(45475aaa)

    layout = master

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # cursor_inactive_timeout = 15

    no_cursor_warps = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = true
    shadow_range = 2
    shadow_render_power = 1
    col.shadow = rgba(585b70aa)
    # dim_inactive = true
    # dim_strength = 0.15
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = false
    mfact = 0.55
    always_center_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0
}

binds {
    allow_workspace_cycles = true
}

# Window Rules
# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
windowrulev2 = float, class:(blueman-manager)
windowrulev2 = float, title:^(Virtual Machine Manager)$
windowrulev2 = float, title:^(Bitwarden)$

# Keymaps
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, killactive,
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, pcmanfm
bind = $mainMod, G, togglefloating,
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p Clipboard | cliphist decode | wl-copy
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, X, fullscreen, 0

# Launcher bindings
bind = $mainMod SHIFT, I, exec, dmenu-virtmanager
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, P, exec, rofi -show drun

# Move focus with mainMod + J and K
bind = $mainMod, J, cyclenext
bind = $mainMod, K, cyclenext, prev

# Jump to previous workspace
bind = $mainMod, Apostrophe, workspace, previous

# Focus Last Urgent Window
bind = $mainMod, U, focusurgentorlast

# Waybar Reload
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar
# Waybar Toggle
bind = $mainMod CONTROL, B, exec, killall -SIGUSR2 waybar

# Resize Windows
bind = $mainMod, L, resizeactive, 100 0
bind = $mainMod, H, resizeactive, -100 0

bind = $mainMod SHIFT, J, layoutmsg, swapnext
bind = $mainMod SHIFT, K, layoutmsg, swapprev
bind = $mainMod SHIFT, Return, layoutmsg, swapwithmaster master

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace and follow with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Move active window to a workspace and do not follow with mainMod + Control + [0-9]
bind = $mainMod CONTROL, 1, movetoworkspacesilent, 1
bind = $mainMod CONTROL, 2, movetoworkspacesilent, 2
bind = $mainMod CONTROL, 3, movetoworkspacesilent, 3
bind = $mainMod CONTROL, 4, movetoworkspacesilent, 4
bind = $mainMod CONTROL, 5, movetoworkspacesilent, 5
bind = $mainMod CONTROL, 6, movetoworkspacesilent, 6
bind = $mainMod CONTROL, 7, movetoworkspacesilent, 7
bind = $mainMod CONTROL, 8, movetoworkspacesilent, 8
bind = $mainMod CONTROL, 9, movetoworkspacesilent, 9

# Scratch Pad
bind = $mainMod CONTROL, N, togglespecialworkspace, magic
bind = $mainMod, N, movetoworkspacesilent, special:magic

bind = $mainMod,Semicolon,exec,pypr toggle term

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio and Brightness Keys
bind = ,XF86AudioRaiseVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioPause, exec, playerctl play-pause
bind = ,XF86AudioNext, exec, playerctl next
bind = ,XF86AudioPrev, exec, playerctl previous
bind = ,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = ,XF86MonBrightnessUp,exec,brightnessctl set +5%
