# ./.tmuxinator.yml

name: project
root: <%= @settings["workspace"] %>

on_project_first_start: <%= @settings["workspace"] %>/vendor/bin/sail up -d

on_project_stop: <%= @settings["workspace"] %>/vendor/bin/sail down

windows:
  - Code: nvim
  - Services: yarn run <%= @settings["yarnscript"] %>
  - LazyGit: lazygit
