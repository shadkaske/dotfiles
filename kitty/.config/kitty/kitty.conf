font_family         JetBrainsMono Nerd Font Thin
italic_font         JetBrainsMono Nerd Font Thin Italic
bold_font           JetBrainsMono Nerd Font SemiBold
bold_italic_font    JetBrainsMono Nerd Font SemiBold Italic
font_size           13.0

adjust_line_height  110%

background_opacity  0.9

enable_audio_bell    no

copy_on_select       yes

hide_window_decorations no

remember_window_size no
initial_window_width 140c
initial_window_height 40c
placement_strategy center

 strip_trailing_spaces smart

confirm_os_window_close 0

window_padding_width 0

tab_bar_min_tabs            2
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

include mocha.conf

# vim:ft=conf
