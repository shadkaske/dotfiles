font_family         JetBrainsMono NFM Light
italic_font         JetBrainsMono NFM Light Italic
bold_font           JetBrainsMono NFM SemiBold
bold_italic_font    JetBrainsMono NFM SemiBold Italic
font_size           12.0

modify_font cell_height 3px

dynamic_background_opacity yes
background_opacity  1.0

enable_audio_bell    no

copy_on_select       yes

hide_window_decorations no

remember_window_size no
initial_window_width 124c
initial_window_height 32c
placement_strategy center

strip_trailing_spaces smart

confirm_os_window_close 0

window_padding_width 4

sync_to_monitor yes

tab_bar_min_tabs            2
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

include themes/tokyonight_night.conf

# vim:ft=conf
