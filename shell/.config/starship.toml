palette = "catppuccin_mocha"

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$character"""

right_format = """
$python\
"""

add_newline = true

[directory]
style = "blue"
truncation_length = 5
truncation_symbol = "..."
home_symbol = " ¾░£ź"
read_only = " Ņ»¦"
truncate_to_repo = false

[os]
disabled = false

[os.symbols]
Arch = "’īā "
Pop = "’ī¬ "
Ubuntu = "’īø "
Garuda = "’īĘ "

[character]
success_symbol = "[ŌØ»](green)"
error_symbol = "[ŌØ»](red)"
vimcmd_symbol = "[ŌØ«](blue)"

[username]
format = "[$user]($style)"

[hostname]
format = "@[$hostname]($style) "
style = "bold dimmed green"

[git_branch]
format = "[$symbol$branch ]($style)"
style = "green"
symbol = "Ņ£ź "

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead_behind$stashed)]($style)"
style = "cyan"
stashed = "ŌēĪ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-blue"

[php]
style = "bright-purple"
format = "[$symbol($version)]($style)"
version_format = "${raw}"
symbol = "Ņ£Į "

