---
ip: "192.168.56.56"
memory: 2048
cpus: 2
provider: virtualbox

authorize: ~/.ssh/id_rsa.pub

keys:
  - ~/.ssh/id_rsa

folders:
  - map: ~/Code/printapp
    to: /home/vagrant/printapp

  - map: ~/Code/phpipam
    to: /home/vagrant/phpipam

  - map: ~/Code/repContact
    to: /home/vagrant/repcontact

  - map: ~/Code/webdocs-cs
    to: /home/vagrant/webdocs

  - map: ~/Code/documentLookup
    to: /home/vagrant/documentLookup

  - map: ~/Code/msds
    to: /home/vagrant/msds

  - map: ~/Code/rework
    to: /home/vagrant/rework

sites:
  - map: printapp.test
    to: /home/vagrant/printapp/public
    php: "7.4"

  - map: phpipam.test
    to: /home/vagrant/phpipam
    php: "7.4"

  - map: lookup.test
    to: /home/vagrant/documentLookup/public
    php: "7.4"

  - map: webdocs.test
    to: /home/vagrant/webdocs/public
    php: "7.4"

  - map: repcontact.test
    to: /home/vagrant/repcontact/public
    php: "7.4"

  - map: msds.test
    to: /home/vagrant/msds/public
    php: "7.4"

  - map: rework.test
    to: /home/vagrant/rework/public
    php: "7.4"

databases:
  - printapp
  - phpipam
  - webdocs
  - lookup
  - msds

features:
  - mysql: true
  - mariadb: false
  - postgresql: false
  - ohmyzsh: true
  - webdriver: false
  - python: true

services:
  - enabled:
        - "mysql"
#    - disabled:
#        - "postgresql@11-main"

