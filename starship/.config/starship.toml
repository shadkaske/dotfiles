palette = "catppuccin_macchiato"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$character"""

right_format = """
$shell\
$python\
"""

add_newline = false

[directory]
style = "blue"
truncation_length = 5
truncation_symbol = "..."
home_symbol = " ¾░£Ñ"
read_only = " ¯»ğ"
truncate_to_repo = false

[os]
disabled = false

[os.symbols]
Arch = "´îâ "
Pop = "´î¬ "
Ubuntu = "´îø "
Garuda = "´îÀ "
NixOS = "´îô "
Fedora = "´îï "

[character]
success_symbol = "[ÔØ»](green)"
error_symbol = "[ÔØ»](red)"
vimcmd_symbol = "[ÔØ«](blue)"

[username]
format = "[$user]($style)"

[hostname]
format = "@[$hostname]($style) "
style = "bold dimmed green"

[git_branch]
format = "[$symbol$branch ]($style)"
style = "green"
symbol = "¯£Ñ "

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead_behind$stashed)]($style)"
style = "cyan"
stashed = "Ôëí"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-blue"

[php]
style = "bright-purple"
format = "[$symbol($version)]($style)"
version_format = "${raw}"
symbol = "¯£¢ "

