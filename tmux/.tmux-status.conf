# This tmux statusbar config was created by tmuxline.vim
# on Sun, 30 May 2021

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#4c6370,bg=#e5c07b"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#61afef"
set -g status-style "none,bg=#2c323d"
set -g message-style "fg=#4c6370,bg=#e5c07b"
set -g pane-border-style "fg=#e5c07b"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#61afef,bg=#2c323d"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#E5E9F0,bg=#2c323d"
set -g status-left "#[fg=#4c6370,bg=#61afef] #S #[fg=#61afef,bg=#e5c07b,nobold,nounderscore,noitalics]#[fg=#e5c07b,bg=#2c323d,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#2c323d,bg=#2c323d,nobold,nounderscore,noitalics]#[fg=#e5c07b,bg=#2c323d,nobold,nounderscore,noitalics]#[fg=#4c6370,bg=#e5c07b] %R #[fg=#61afef,bg=#e5c07b,nobold,nounderscore,noitalics]#[fg=#4c6370,bg=#61afef] #H "
setw -g window-status-format "#[fg=#2c323d,bg=#2c323d,nobold,nounderscore,noitalics]#[default] #I ) #W #[fg=#2c323d,bg=#2c323d,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#2c323d,bg=#e5c07b,nobold,nounderscore,noitalics]#[fg=#4c6370,bg=#e5c07b] #I ) #W ) #F #[fg=#e5c07b,bg=#2c323d,nobold,nounderscore,noitalics]"
